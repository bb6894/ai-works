server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: smart-agri-monitor
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/smart_agri?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root123456}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 3s
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

smart-agri:
  admin:
    default-password: ${ADMIN_DEFAULT_PASSWORD:admin123}
  jwt:
    secret: ${JWT_SECRET:smart-agri-demo-secret-key-with-at-least-32-bytes}
    ttl-minutes: ${JWT_TTL_MINUTES:720}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:8088}
  simulator:
    enabled: ${SIMULATOR_ENABLED:true}
    fixed-delay-ms: ${SIMULATOR_DELAY_MS:10000}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info
