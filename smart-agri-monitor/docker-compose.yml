services:
  mysql:
    image: mysql:8.4
    container_name: smart-agri-mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --init-connect='SET NAMES utf8mb4'
    environment:
      LANG: C.UTF-8
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: smart_agri
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - ./deploy/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot123456"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4-alpine
    container_name: smart-agri-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: smart-agri-backend
    environment:
      MYSQL_URL: jdbc:mysql://mysql:3306/smart_agri?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
      MYSQL_USER: root
      MYSQL_PASSWORD: root123456
      REDIS_HOST: redis
      JWT_SECRET: smart-agri-demo-secret-key-with-at-least-32-bytes
      CORS_ALLOWED_ORIGINS: http://localhost:8088,http://localhost:5173
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: smart-agri-frontend
    ports:
      - "8088:80"
    depends_on:
      - backend

volumes:
  mysql_data:
